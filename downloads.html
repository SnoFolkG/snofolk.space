<body>
  <header>
    <h1>SnoFolk.Space</h1>
    <nav>
      <a href="index.html">Homepage</a>
      <a href="downloads.html"><strong>Downloads</strong></a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>
  <main>
    <section>
      <h2>Download Full Collection</h2>
      <div class="collection-download">
        <div class="collection-info">
          <p><strong>Latest version v5.0.0</strong></p>
          <p>31 albums · 18 artists · ~400 tracks</p>
        </div>
        <a href="https://drive.google.com/file/d/12HoTkjLn_6eL8s4gqpCgnLDVa8Q9k3J2/view?usp=drive_link" class="download-btn download-btn-big">
          Download Collection
        </a>
      </div>
    </section>
    <section>
      <h2>Older Versions</h2>
      <div id="old-versions"></div>
    </section>
    <section>
      <h2>Albums</h2>
      
      <div class="sorting-section">
        <div class="sort-group">
          <label for="sort-by">Sort By</label>
          <select id="sort-by">
            <option value="date-added-desc">Date Added (Newest)</option>
            <option value="year-desc">Year (Newest First)</option>
            <option value="year-asc">Year (Oldest First)</option>
            <option value="title-asc">Title (A-Z)</option>
            <option value="title-desc">Title (Z-A)</option>
            <option value="artist-asc">Artist (A-Z)</option>
            <option value="artist-desc">Artist (Z-A)</option>
          </select>
        </div>
        <button id="reset-sort" class="download-btn">Reset</button>
      </div>

      <div class="albums" id="albums"></div>
    </section>
  </main>
  <footer>
